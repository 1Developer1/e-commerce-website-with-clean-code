apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecommerce-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecommerce-app
  minReplicas: 2
  maxReplicas: 5
  behavior:
    # Fail-safe: Scale down slowly to prevent Force Multiplier anti-pattern
    scaleDown:
      stabilizationWindowSeconds: 300   # 5 dakika bekle before scale down
      policies:
      - type: Pods
        value: 1                        # Tek seferde maks 1 pod azalt
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60    # 1 dakika bekle before scale up
      policies:
      - type: Pods
        value: 2                        # Tek seferde maks 2 pod ekle
        periodSeconds: 60
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
