apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  labels:
    app: ecommerce-app
spec:
  replicas: 2
  # Zero-downtime deployment strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0   # Hiçbir zaman tüm pod'lar kapalı olmamalı
      maxSurge: 1          # Aynı anda 1 fazla pod başlatılabilir
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      terminationGracePeriodSeconds: 30 # Graceful shutdown advance
      containers:
      - name: ecommerce-app
        image: ecommerce-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # Environment variables (Secrets externalization)
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secrets
              key: jwt-secret
        - name: DB_POOL_MAX
          value: "10"
        - name: DB_POOL_MIN
          value: "5"
        
        # Physical Bulkhead: CPU & RAM Limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
            
        # Liveness Probe (Control Plane)
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3
          
        # Readiness Probe (Control Plane)
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 2
